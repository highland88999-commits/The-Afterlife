<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysium Odyssey — Nexus Vortex</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:wght@400;500&display=swap');

        :root {
            --gold: #c5a059;
            --cyan: #00f3ff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            color: #fff;
            font-family: 'EB Garamond', serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Interaction Shield (Fixes Audio Block) */
        #start-shield {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* Background Three.js */
        #elysium-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            width: 100%; height: 100%;
        }

        /* Device Adaptable Intro */
        #intro-container {
            display: flex;
            flex-direction: column;
            width: 100%; height: 100%;
            transition: opacity 1s ease;
        }

        #top-section {
            flex: 1.2;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #anubis-media {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Responsive scaling */
        }

        #bottom-section {
            flex: 0.8;
            background: rgba(5, 5, 5, 0.95);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            cursor: pointer;
        }

        #dialogue-container {
            width: 95%; max-width: 600px;
            border: 1px solid rgba(197, 160, 89, 0.4);
            padding: 15px;
            position: relative;
        }

        #text-content { font-size: 1.3rem; line-height: 1.4; color: #efefef; }

        /* VERTICAL CATALOG SLIDER */
        #catalog {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            z-index: 10;
        }

        .catalog-slider {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50vh 0; /* Padding allows first/last cards to center */
            gap: 40px;
        }

        .casket-card {
            flex: 0 0 300px;
            width: 80%;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: 0.4s ease;
            scroll-snap-align: center;
        }

        .casket-card.active {
            background: rgba(0, 243, 255, 0.08);
            border-color: var(--cyan);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.2);
            transform: scale(1.05);
        }

        .icon-wrapper {
            font-size: 3.5rem;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .casket-card.active .icon-wrapper {
            color: var(--cyan);
            filter: drop-shadow(0 0 8px var(--cyan));
        }

        .label { font-family: 'Cinzel', serif; letter-spacing: 2px; text-align: center; color: #fff; }

        #catalog::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="start-shield" onclick="unlockExperience()">
        <h1 style="font-family:'Cinzel'; color:var(--gold); letter-spacing:5px;">ENTER ELYSIUM</h1>
    </div>

    <canvas id="elysium-canvas"></canvas>

    <div id="intro-container">
        <div id="top-section">
            <video id="anubis-media" loop playsinline>
                <source src="https://files.catbox.moe/znctv1.mp4" type="video/mp4">
            </video>
        </div>
        <div id="bottom-section" onclick="nextDialogue()">
            <div id="dialogue-container">
                <p id="text-content"></p>
                <div style="text-align:right; font-family:'Cinzel'; font-size:0.7rem; color:var(--gold);">[ TAP TO CONTINUE ]</div>
            </div>
        </div>
    </div>

    <div id="catalog">
        <div class="catalog-slider" id="slider-inner"></div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // --- Three.js Scene ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('elysium-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const grid = new THREE.GridHelper(100, 40, 0x00f3ff, 0x050505);
        grid.position.y = -2;
        scene.add(grid);

        camera.position.z = 10;
        camera.position.y = 1;

        function animate() {
            requestAnimationFrame(animate);
            grid.position.z += 0.03;
            if(grid.position.z > 2.5) grid.position.z = 0;
            renderer.render(scene, camera);
        }
        animate();

        // --- Experience Logic ---
        const video = document.getElementById('anubis-media');
        const shield = document.getElementById('start-shield');

        window.unlockExperience = function() {
            shield.style.display = 'none';
            video.muted = false; // Audio restored
            video.play();
            nextDialogue();
        };

        const script = [
            "Hi, I'm <span style='color:#c5a059'>Anubis</span>!",
            "Welcome to the afterlife.",
            "Here you can purchase caskets.",
            "\"Funerals are a never dying industry.\"",
            "\"You can pick your perma-bed below.\"",
            "We recommend memory foam linings or you will not be granted access to <span style='color:#c5a059'>ELYSIUM</span>.",
            "No cheap skates allowed..."
        ];

        let step = 0;
        window.nextDialogue = function() {
            if(step < script.length) {
                document.getElementById('text-content').innerHTML = script[step];
                step++;
            } else {
                document.getElementById('intro-container').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-container').style.display = 'none';
                    document.getElementById('catalog').style.display = 'block';
                    highlightCard(); // Initial check
                }, 1000);
            }
        };

        const vendors = [
            { name: "Titan Casket", url: "https://titancasket.com", icon: "fa-box" },
            { name: "Trusted Caskets", url: "https://trustedcaskets.com", icon: "fa-cross" },
            { name: "Overnight Caskets", url: "https://overnightcaskets.com", icon: "fa-bed" },
            { name: "Casket Depot", url: "https://casketdepot.ca", icon: "fa-shield" },
            { name: "Haven Casket", url: "https://havencasket.com", icon: "fa-gem" }
        ];

        const slider = document.getElementById('slider-inner');
        vendors.forEach(v => {
            const card = document.createElement('a');
            card.className = 'casket-card';
            card.href = v.url;
            card.target = "_blank";
            card.innerHTML = `<div class="icon-wrapper"><i class="fa-solid ${v.icon}"></i></div><div class="label">${v.name}</div>`;
            slider.appendChild(card);
        });

        // Vertical Highlight Logic
        const catalog = document.getElementById('catalog');
        function highlightCard() {
            const cards = document.querySelectorAll('.casket-card');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const center = rect.top + rect.height / 2;
                const dist = Math.abs(center - window.innerHeight / 2);
                card.classList.toggle('active', dist < 150);
            });
        }
        catalog.addEventListener('scroll', highlightCard);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
