<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysium Odyssey — Casket Catalog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;1,500&display=swap');

        :root {
            --hologram-blue: #00f3ff;
            --black-bloom: rgba(0, 0, 0, 0.88);
            --glow: 0 0 30px rgba(0, 243, 255, 0.4);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'EB Garamond', serif;
            background: #000;
            color: #fff;
        }

        /* Nexus Vortex Background */
        #elysium-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -3;
        }

        /* Slowed Video Overlay */
        #bg-video {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%);
            z-index: -2;
            filter: brightness(0.45) grayscale(0.25);
            object-fit: cover;
            opacity: 0.85;
        }

        /* Anubis Dialogue Box (MANDATORY click-through) */
        #dialogue-box {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 720px;
            height: 160px;
            background: rgba(15, 15, 15, 0.96);
            border: 4px double #c5a059;
            padding: 25px 30px;
            box-sizing: border-box;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 0 40px rgba(197, 160, 89, 0.3);
            transition: all 0.4s;
        }

        #dialogue-box:hover {
            box-shadow: 0 0 50px rgba(197, 160, 89, 0.5);
        }

        #text-content {
            color: #e0e0e0;
            font-size: 1.45rem;
            line-height: 1.45;
            margin: 0;
            text-shadow: 0 0 8px #c5a059;
        }

        .arrow {
            position: absolute;
            bottom: 12px;
            right: 25px;
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 14px solid #c5a059;
            animation: bounce 0.9s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(6px); }
        }

        /* CASKET CATALOG — HORIZONTAL SLIDER WITH SCROLL HIGHLIGHT */
        #catalog {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 15;
            display: none;
            padding: 80px 20px;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            background: radial-gradient(circle, transparent 30%, rgba(5,5,5,0.85) 80%);
            scrollbar-width: none;
        }

        #catalog::-webkit-scrollbar { display: none; }

        .catalog-slider {
            display: flex;
            gap: 30px;
            padding: 20px 0;
            width: max-content;
        }

        .casket-card {
            width: 240px;
            flex: 0 0 240px;
            aspect-ratio: 4/4.2;
            background: rgba(0, 0, 139, 0.35);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(197, 160, 89, 0.4);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 0, 139, 0.3);
            scroll-snap-align: center;
        }

        .casket-card.active {
            transform: scale(1.12);
            border-color: #c5a059;
            box-shadow: 0 0 60px rgba(197, 160, 89, 0.7);
            z-index: 2;
        }

        .casket-card .video-mask {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            overflow: hidden;
        }

        .casket-card .masked-video {
            width: 88%; height: 88%;
            object-fit: cover;
            opacity: 0.75;
            filter: brightness(0.9);
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><circle cx="100" cy="100" r="88" fill="%23fff"/></svg>');
            mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><circle cx="100" cy="100" r="88" fill="%23fff"/></svg>');
        }

        .casket-card .icon-wrapper {
            position: relative;
            z-index: 2;
            font-size: 5rem;
            color: #c5a059;
            filter: drop-shadow(0 0 15px #c5a059);
            margin-bottom: 15px;
        }

        .casket-card .label {
            position: relative;
            z-index: 2;
            color: #fff;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            opacity: 0.95;
            font-family: 'Cinzel', serif;
        }
    </style>
</head>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // Nexus Vortex Background
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.15);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.getElementById('elysium-canvas').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0xc5a059, 100);
        spotLight.position.set(0, 10, 5);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.5;
        scene.add(spotLight);

        const bluePointLight = new THREE.PointLight(0x00f2ff, 50, 20);
        bluePointLight.position.set(-5, 2, -5);
        scene.add(bluePointLight);

        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.1, metalness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const ringGeo = new THREE.TorusGeometry(3, 0.05, 16, 100);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.set(0, 3.5, -8);
        scene.add(ring);

        const particlesGeo = new THREE.BufferGeometry();
        const particlesCount = 500;
        const posArray = new Float32Array(particlesCount * 3);
        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 20;
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMat = new THREE.PointsMaterial({ size: 0.02, color: 0x00f2ff, transparent: true, opacity: 0.6 });
        const particlesMesh = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particlesMesh);

        camera.position.set(0, 2, 8);
        camera.lookAt(0, 3, -8);

        function animate() {
            requestAnimationFrame(animate);
            ring.rotation.z += 0.01;
            ring.rotation.y += 0.005;
            particlesMesh.rotation.y += 0.001;
            particlesMesh.position.y += Math.sin(Date.now() * 0.001) * 0.002;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

    <script>
        // Slow video + dialogue
        const video = document.getElementById('bg-video');
        video.playbackRate = 0.3;
        video.play();

        const script = [
            "Hi, I'm <span style='color:#c5a059'>Anubis</span>!",
            "Welcome to the afterlife.",
            "Here you can purchase caskets.",
            "\"Funerals are a never dying industry.\"",
            "\"You can pick your perma-bed below.\"",
            "We recommend memory foam linings or you will not be granted access to <span style='color:#c5a059'>ELYSIUM</span>.",
            "Sorry, but no cheap skates allowed, unless cheap skates are the reason you are shopping today."
        ];

        let currentStep = 0;
        const textElement = document.getElementById('text-content');
        const dialogueBox = document.getElementById('dialogue-box');
        const catalog = document.getElementById('catalog');

        function typeWriter(text) {
            textElement.innerHTML = text;
        }

        function nextDialogue() {
            if (currentStep < script.length) {
                typeWriter(script[currentStep]);
                currentStep++;
            } else {
                dialogueBox.style.opacity = '0';
                setTimeout(() => {
                    dialogueBox.style.display = 'none';
                    catalog.style.display = 'block';
                }, 600);
            }
        }

        window.onload = () => nextDialogue();

        // SLIDER HIGHLIGHT LOGIC
        const slider = document.getElementById('catalog');
        const cards = document.querySelectorAll('.casket-card');

        function highlightCenter() {
            let closest = null;
            let minDistance = Infinity;

            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const distance = Math.abs(centerX - window.innerWidth / 2);

                if (distance < minDistance) {
                    minDistance = distance;
                    closest = card;
                }
            });

            cards.forEach(c => c.classList.remove('active'));
            if (closest) closest.classList.add('active');
        }

        slider.addEventListener('scroll', highlightCenter);
        window.addEventListener('resize', highlightCenter);

        // Initial highlight
        setTimeout(highlightCenter, 800);
    </script>
