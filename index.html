<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysium Odyssey — Nexus Vortex</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:wght@400;500&display=swap');

        :root {
            --gold: #c5a059;
            --cyan: #00f3ff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            color: #fff;
            font-family: 'EB Garamond', serif;
            overflow: hidden;
        }

        /* Background Three.js Canvas */
        #elysium-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1; /* Behind everything */
            width: 100%; height: 100%;
        }

        /* Intro Layout (Anubis + Dialogue) */
        #intro-container {
            display: flex;
            flex-direction: column;
            width: 100%; height: 100%;
            transition: opacity 1s ease;
        }

        #top-section {
            flex: 1.2;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(26,26,26,0.6) 0%, rgba(0,0,0,0.9) 80%);
        }

        #anubis-media {
            width: 100%; height: 100%;
            object-fit: contain;
        }

        #bottom-section {
            flex: 0.8;
            background: rgba(5, 5, 5, 0.95);
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            cursor: pointer;
        }

        #dialogue-container {
            width: 90%; max-width: 600px;
            border: 1px solid rgba(197, 160, 89, 0.4);
            padding: 20px;
            position: relative;
        }

        #text-content { font-size: 1.5rem; line-height: 1.4; color: #efefef; }

        /* Catalog Layout */
        #catalog {
            position: absolute;
            top: 50%; left: 0;
            transform: translateY(-50%);
            width: 100%;
            display: none; /* Hidden until Anubis is done */
            overflow-x: auto;
            scrollbar-width: none;
            z-index: 10;
        }

        .catalog-slider {
            display: flex;
            padding: 0 40vw;
            gap: 50px;
        }

        /* Transparent Glass Cards */
        .casket-card {
            flex: 0 0 260px;
            height: 350px;
            background: rgba(255, 255, 255, 0.03); /* Transparent */
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: 0.5s;
        }

        .casket-card.active {
            background: rgba(0, 243, 255, 0.08);
            border-color: var(--cyan);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            transform: scale(1.1);
        }

        .icon-wrapper {
            font-size: 4rem;
            color: var(--gold);
            opacity: 0.8;
            margin-bottom: 20px;
            transition: 0.5s;
        }

        .casket-card.active .icon-wrapper {
            color: var(--cyan);
            opacity: 1;
            filter: drop-shadow(0 0 10px var(--cyan));
        }

        .label {
            font-family: 'Cinzel', serif;
            letter-spacing: 3px;
            color: #fff;
            text-align: center;
        }

        #catalog::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <canvas id="elysium-canvas"></canvas>

    <div id="intro-container">
        <div id="top-section">
            <video id="anubis-media" autoplay muted loop playsinline>
                <source src="https://files.catbox.moe/znctv1.mp4" type="video/mp4">
            </video>
        </div>
        <div id="bottom-section" onclick="nextDialogue()">
            <div id="dialogue-container">
                <p id="text-content"></p>
                <div style="text-align:right; font-family:'Cinzel'; font-size:0.7rem; color:var(--gold);">CONTINUE ></div>
            </div>
        </div>
    </div>

    <div id="catalog">
        <div class="catalog-slider" id="slider-inner">
            </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // --- Three.js Background Logic ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('elysium-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Neon Grid
        const grid = new THREE.GridHelper(100, 40, 0x00f3ff, 0x050505);
        grid.position.y = -2;
        scene.add(grid);

        // Glowing Portal in distance
        const portalGeo = new THREE.TorusGeometry(5, 0.02, 16, 100);
        const portalMat = new THREE.MeshBasicMaterial({ color: 0x00f3ff });
        const portal = new THREE.Mesh(portalGeo, portalMat);
        portal.position.z = -15;
        scene.add(portal);

        camera.position.z = 10;
        camera.position.y = 1;

        function animate() {
            requestAnimationFrame(animate);
            grid.position.z += 0.05;
            if(grid.position.z > 2.5) grid.position.z = 0;
            portal.rotation.z += 0.01;
            renderer.render(scene, camera);
        }
        animate();

        // --- Dialogue & Catalog Logic ---
        const script = [
            "Hi, I'm <span style='color:#c5a059'>Anubis</span>!",
            "Welcome to the afterlife.",
            "Here you can purchase caskets.",
            "\"Funerals are a never dying industry.\"",
            "\"You can pick your perma-bed below.\"",
            "We recommend memory foam linings or you will not be granted access to <span style='color:#c5a059'>ELYSIUM</span>.",
            "No cheap skates allowed..."
        ];

        let step = 0;
        window.nextDialogue = function() {
            if(step < script.length) {
                document.getElementById('text-content').innerHTML = script[step];
                step++;
            } else {
                // Exit Intro, Enter Catalog
                document.getElementById('intro-container').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-container').style.display = 'none';
                    document.getElementById('catalog').style.display = 'block';
                }, 1000);
            }
        };

        const vendors = [
            { name: "Titan Casket", url: "https://titancasket.com", icon: "fa-box" },
            { name: "Trusted Caskets", url: "https://trustedcaskets.com", icon: "fa-cross" },
            { name: "Overnight Caskets", url: "https://overnightcaskets.com", icon: "fa-bed" },
            { name: "Casket Depot", url: "https://casketdepot.ca", icon: "fa-shield" }
        ];

        const slider = document.getElementById('slider-inner');
        vendors.forEach(v => {
            const card = document.createElement('a');
            card.className = 'casket-card';
            card.href = v.url;
            card.target = "_blank";
            card.innerHTML = `<div class="icon-wrapper"><i class="fa-solid ${v.icon}"></i></div><div class="label">${v.name}</div>`;
            slider.appendChild(card);
        });

        // Center Highlight Logic
        document.getElementById('catalog').addEventListener('scroll', () => {
            const cards = document.querySelectorAll('.casket-card');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const center = rect.left + rect.width / 2;
                const dist = Math.abs(center - window.innerWidth/2);
                card.classList.toggle('active', dist < 150);
            });
        });

        window.onload = nextDialogue;
    </script>
</body>
</html>
