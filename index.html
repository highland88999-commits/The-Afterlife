<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elysium Odyssey — Nexus Vortex</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;1,500&display=swap');

        :root {
            --gold: #c5a059;
            --cyan: #00f3ff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            color: #fff;
            font-family: 'EB Garamond', serif;
            overflow: hidden;
        }

        /* Video Intro Layer */
        #intro-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1000;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease, visibility 1.5s;
        }

        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #skip-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 20px;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            z-index: 1001;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        #skip-btn:hover { background: var(--gold); color: #000; }

        /* The 3D Scene Background */
        #elysium-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
        }

        /* Dialogue Box */
        #dialogue-box {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 800px;
            background: rgba(5, 5, 5, 0.9);
            border: 1px solid var(--gold);
            padding: 30px;
            z-index: 20;
            cursor: pointer;
            display: none; /* Hidden until video ends */
            box-shadow: inset 0 0 20px rgba(197, 160, 89, 0.2), 0 0 40px rgba(0,0,0,1);
            backdrop-filter: blur(10px);
        }

        #text-content {
            font-size: 1.6rem;
            color: #efefef;
            min-height: 80px;
        }

        .arrow {
            position: absolute;
            bottom: 15px;
            right: 20px;
            width: 0; height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 12px solid var(--gold);
            animation: bounce 1s infinite;
        }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(5px); } }

        /* Catalog Layout */
        #catalog {
            position: absolute;
            top: 50%; left: 0;
            transform: translateY(-50%);
            width: 100%;
            z-index: 15;
            display: none;
            overflow-x: scroll;
            scrollbar-width: none;
        }

        .catalog-slider { display: flex; padding: 0 40vw; }

        .casket-card {
            flex: 0 0 280px;
            margin: 0 40px;
            height: 380px;
            background: rgba(0, 0, 139, 0.1);
            border: 1px solid rgba(0, 243, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.5s;
            text-decoration: none;
        }

        .casket-card.active {
            transform: scale(1.15);
            border-color: var(--cyan);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.3);
        }

        .label { font-family: 'Cinzel', serif; letter-spacing: 3px; color: #fff; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="intro-layer">
        <video id="intro-video" playsinline>
            <source src="https://files.catbox.moe/znctv1.mp4" type="video/mp4">
        </video>
        <button id="skip-btn" onclick="endIntro()">SKIP TO AFTERLIFE</button>
    </div>

    <canvas id="elysium-canvas"></canvas>

    <div id="dialogue-box" onclick="nextDialogue()">
        <div id="text-content"></div>
        <div class="arrow"></div>
    </div>

    <div id="catalog">
        <div class="catalog-slider" id="slider-inner">
            </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('elysium-canvas').appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(100, 50, 0x00f3ff, 0x050505);
        grid.position.y = -2;
        scene.add(grid);

        const portalGeo = new THREE.TorusGeometry(5, 0.05, 16, 100);
        const portalMat = new THREE.MeshBasicMaterial({ color: 0x00f3ff, transparent: true, opacity: 0.5 });
        const portal = new THREE.Mesh(portalGeo, portalMat);
        portal.position.z = -15;
        scene.add(portal);

        camera.position.z = 15;

        function animate() {
            requestAnimationFrame(animate);
            portal.rotation.z += 0.002;
            grid.position.z += 0.04;
            if(grid.position.z > 2) grid.position.z = 0;
            renderer.render(scene, camera);
        }
        animate();

        // --- Sequence Logic ---
        const video = document.getElementById('intro-video');
        const introLayer = document.getElementById('intro-layer');
        const dialogueBox = document.getElementById('dialogue-box');

        // Auto-end intro when video finishes
        video.onended = () => endIntro();

        window.endIntro = function() {
            introLayer.style.opacity = '0';
            setTimeout(() => {
                introLayer.style.visibility = 'hidden';
                dialogueBox.style.display = 'block';
                startDialogue();
            }, 1500);
        };

        // Start video on first user interaction (browser policy)
        window.onclick = () => { if(video.paused && !introLayer.style.visibility) video.play(); };

        const script = [
            "Hi, I'm <span style='color:#c5a059'>Anubis</span>!",
            "Welcome to the afterlife.",
            "Here you can purchase caskets.",
            "\"Funerals are a never dying industry.\"",
            "\"You can pick your perma-bed below.\"",
            "We recommend memory foam linings or you will not be granted access to <span style='color:#c5a059'>ELYSIUM</span>.",
            "No cheap skates allowed, unless cheap skates are why you're here."
        ];

        let step = 0;
        function startDialogue() {
            nextDialogue();
        }

        window.nextDialogue = function() {
            if(step < script.length) {
                document.getElementById('text-content').innerHTML = script[step];
                step++;
            } else {
                dialogueBox.style.display = 'none';
                document.getElementById('catalog').style.display = 'block';
                // Move camera forward into the portal
                gsap.to(camera.position, {z: 5, duration: 2.5, ease: "expo.out"});
            }
        };

        // --- Populate Catalog ---
        const vendors = [
            { name: "Titan Casket", url: "https://titancasket.com", icon: "fa-box" },
            { name: "Trusted Caskets", url: "https://trustedcaskets.com", icon: "fa-cross" },
            { name: "Overnight Caskets", url: "https://overnightcaskets.com", icon: "fa-bed" }
        ];
        const container = document.getElementById('slider-inner');
        vendors.forEach(v => {
            const card = document.createElement('a');
            card.className = 'casket-card';
            card.href = v.url;
            card.target = "_blank";
            card.innerHTML = `<i class="fa-solid ${v.icon}" style="font-size:3rem; color:var(--gold)"></i><div class="label">${v.name}</div>`;
            container.appendChild(card);
        });

        // Highlight Logic
        document.getElementById('catalog').onscroll = () => {
            const cards = document.querySelectorAll('.casket-card');
            cards.forEach(card => {
                const dist = Math.abs(card.getBoundingClientRect().left + 140 - window.innerWidth/2);
                card.classList.toggle('active', dist < 150);
            });
        };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</body>
</html>
