<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elysium Odyssey — Nexus Vortex</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:wght@400;500&display=swap');

        :root {
            --gold: #c5a059;
            --cyan: #00f3ff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background: #000;
            color: #fff;
            font-family: 'EB Garamond', serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 1. START SHIELD */
        #gatekeeper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 5000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }

        #gatekeeper h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            letter-spacing: 5px;
            padding: 20px;
            border: 1px solid var(--gold);
            text-align: center;
        }

        /* 2. BACKGROUND GRID (Hidden during intro) */
        #elysium-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 2s ease-in;
            pointer-events: none;
        }

        /* 3. INTRO STAGE (Box 1 over Box +) */
        #intro-stage {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #000;
            transition: opacity 1s ease;
        }

        /* Top 60% - Anubis Video */
        #top-section {
            height: 60vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Sits video right above the divider line */
            overflow: hidden;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        #anubis-media {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps character proportion perfect */
        }

        /* Bottom 40% - Dialogue Text */
        #bottom-section {
            height: 40vh;
            width: 100%;
            background: #050505;
            border-top: 2px solid var(--gold);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            cursor: pointer;
        }

        #dialogue-frame {
            width: 100%;
            max-width: 500px;
            height: auto;
            min-height: 120px;
            border: 1px solid rgba(197, 160, 89, 0.4);
            padding: 20px;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            box-sizing: border-box;
        }

        #text-content {
            font-size: 1.4rem;
            line-height: 1.4;
            color: #efefef;
            margin: 0;
        }

        #tap-hint {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            color: var(--gold);
            letter-spacing: 2px;
        }

        /* 4. CATALOG PORTAL */
        #catalog-portal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 20;
            display: none;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .vertical-track {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 45vh 0;
            gap: 40px;
        }

        .casket-card {
            flex: 0 0 280px;
            width: 85%;
            max-width: 320px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(197, 160, 89, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            scroll-snap-align: center;
            transition: 0.4s ease;
            opacity: 0.4;
        }

        .casket-card.active {
            opacity: 1;
            border-color: var(--cyan);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.2);
            transform: scale(1.05);
        }

        .icon-box { font-size: 3rem; color: var(--gold); margin-bottom: 15px; }
        .casket-card.active .icon-box { color: var(--cyan); }
        .label { font-family: 'Cinzel', serif; color: #fff; letter-spacing: 2px; font-size: 0.9rem; }

        #catalog-portal::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="gatekeeper" onclick="startExperience()">
        <h1>ENTER ELYSIUM</h1>
    </div>

    <canvas id="elysium-canvas"></canvas>

    <div id="intro-stage">
        <div id="top-section">
            <video id="anubis-media" loop playsinline>
                <source src="https://files.catbox.moe/znctv1.mp4" type="video/mp4">
            </video>
        </div>
        <div id="bottom-section" onclick="nextDialogue()">
            <div id="dialogue-frame">
                <p id="text-content"></p>
                <div id="tap-hint">TAP TO CONTINUE</div>
            </div>
        </div>
    </div>

    <div id="catalog-portal">
        <div class="vertical-track" id="card-list"></div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // --- Three.js Initialization ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('elysium-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const grid = new THREE.GridHelper(100, 40, 0x00f3ff, 0x050505);
        grid.position.y = -2;
        scene.add(grid);
        camera.position.z = 10; camera.position.y = 1;

        function animate() {
            requestAnimationFrame(animate);
            grid.position.z += 0.04;
            if(grid.position.z > 2.5) grid.position.z = 0;
            renderer.render(scene, camera);
        }
        animate();

        // --- Logic ---
        const video = document.getElementById('anubis-media');
        const stage = document.getElementById('intro-stage');
        const canvas = document.getElementById('elysium-canvas');
        const portal = document.getElementById('catalog-portal');

        window.startExperience = () => {
            document.getElementById('gatekeeper').style.opacity = '0';
            setTimeout(() => document.getElementById('gatekeeper').style.display = 'none', 800);
            video.muted = false;
            video.play();
            nextDialogue();
        };

        const script = [
            "Hi, I'm <span style='color:#c5a059'>Anubis</span>!",
            "Welcome to the afterlife.",
            "Here you can purchase caskets.",
            "\"Funerals are a never dying industry.\"",
            "\"You can pick your perma-bed below.\"",
            "We recommend memory foam linings...",
            "Your perma-bed awaits."
        ];

        let i = 0;
        window.nextDialogue = () => {
            if(i < script.length) {
                document.getElementById('text-content').innerHTML = script[i];
                i++;
            } else {
                stage.style.opacity = '0';
                setTimeout(() => {
                    stage.style.display = 'none';
                    canvas.style.opacity = '1';
                    portal.style.display = 'block';
                    setTimeout(() => portal.style.opacity = '1', 100);
                    updateCards();
                }, 1000);
            }
        };

        const list = document.getElementById('card-list');
        const vendors = [
            { n: "Titan Casket", u: "https://titancasket.com", i: "fa-box-open" },
            { n: "Trusted Caskets", u: "https://trustedcaskets.com", i: "fa-cross" },
            { n: "Overnight Caskets", u: "https://overnightcaskets.com", i: "fa-truck-fast" },
            { n: "Casket Depot", u: "https://casketdepot.ca", i: "fa-vault" }
        ];

        vendors.forEach(v => {
            const a = document.createElement('a');
            a.className = 'casket-card';
            a.href = v.u; a.target = "_blank";
            a.innerHTML = `<div class="icon-box"><i class="fa-solid ${v.i}"></i></div><div class="label">${v.n}</div>`;
            list.appendChild(a);
        });

        function updateCards() {
            const cards = document.querySelectorAll('.casket-card');
            cards.forEach(c => {
                const r = c.getBoundingClientRect();
                const m = r.top + r.height / 2;
                const d = Math.abs(m - window.innerHeight / 2);
                c.classList.toggle('active', d < 150);
            });
        }
        portal.addEventListener('scroll', updateCards);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
